# ── Leader sequences (\ + key) ──────────────────────────────────

[[actions]]
name = "edit-file-at-working-copy"
lua = '''
local file = context.file()
if not file then
    flash("No file selected")
    return
end
exec_shell("$EDITOR " .. file)
'''

[[bindings]]
action = "edit-file-at-working-copy"
seq = ["\\", "e"]
scope = "revisions"
desc = "Edit file in @"

[[actions]]
name = "edit-file-in-change"
lua = '''
local file = context.file()
local cid = context.change_id()
if not file or not cid then
    flash("No file or revision selected")
    return
end
exec_shell("jj edit " .. cid .. " && $EDITOR " .. file)
'''

[[bindings]]
action = "edit-file-in-change"
seq = ["\\", "E"]
scope = "revisions"
desc = "Edit file in change"

# ── Custom commands ─────────────────────────────────────────────

[[actions]]
name = "tug"
lua = '''
local cid = context.change_id()
jj_async("bookmark", "move", "--from", "closest_bookmark(" .. cid .. ")", "--to", "closest_pushable(" .. cid .. ")")
revisions.refresh()
'''

[[bindings]]
action = "tug"
key = "ctrl+t"
scope = "revisions"
desc = "Tug bookmark to closest pushable"

[[actions]]
name = "move-commit-down"
lua = '''
local cid = context.change_id()
jj_async("rebase", "-r", cid, "--insert-before", cid .. "-")
revisions.refresh()
'''

[[bindings]]
action = "move-commit-down"
key = "J"
scope = "revisions"
desc = "Move commit down"

[[actions]]
name = "move-commit-up"
lua = '''
local cid = context.change_id()
jj_async("rebase", "-r", cid, "--insert-after", cid .. "+")
revisions.refresh()
'''

[[bindings]]
action = "move-commit-up"
key = "K"
scope = "revisions"
desc = "Move commit up"

[[actions]]
name = "new-note-commit"
lua = '''
jj_async("new", "--no-edit", "-A", context.change_id())
revisions.refresh()
'''

[[bindings]]
action = "new-note-commit"
key = "N"
scope = "revisions"
desc = "New note commit"

[[actions]]
name = "open-file"
lua = '''
local file = context.file()
if not file then
    flash("No file selected")
    return
end
exec_shell("nvim " .. file)
'''

[[bindings]]
action = "open-file"
key = "O"
scope = "revisions"
desc = "Open file in nvim"

[[actions]]
name = "open-github-pr"
lua = '''
local change_id = context.change_id()
if not change_id then
    flash("No revision selected")
    return
end

local template = [[if(!remote, name ++ "\n")]]
local output, err = jj({"bookmark", "list", "-r", change_id, "--template", template, "--color", "never"})
if err then
    flash("Failed to get bookmarks: " .. err)
    return
end

local bookmarks = {}
for _, line in ipairs(split_lines(output)) do
    if line ~= "" then
        table.insert(bookmarks, line)
    end
end

if #bookmarks == 0 then
    flash("No bookmarks on this revision")
    return
end

local bookmark
if #bookmarks == 1 then
    bookmark = bookmarks[1]
else
    bookmark = choose({title = "Select bookmark for PR", options = bookmarks})
    if not bookmark then
        return
    end
end

local remote_output, remote_err = jj({"git", "remote", "list"})
if remote_err then
    flash("Failed to get remotes: " .. remote_err)
    return
end

local remote_url = nil
for _, line in ipairs(split_lines(remote_output)) do
    local name, url = line:match("^(%S+)%s+(.+)$")
    if name == "origin" and url then
        remote_url = url
        break
    end
end

if not remote_url then
    flash("No origin remote found")
    return
end

local owner, repo

local ssh_host, ssh_path = remote_url:match("^git@([^:]+):(.+)$")
if ssh_host and ssh_host:find("github") then
    owner, repo = ssh_path:gsub("%.git$", ""):match("^([^/]+)/(.+)$")
end

if not owner then
    local https_host, https_path = remote_url:match("^https?://([^/]+)/(.+)$")
    if https_host and https_host:find("github") then
        owner, repo = https_path:gsub("%.git$", ""):match("^([^/]+)/(.+)$")
    end
end

if not owner or not repo then
    flash("Not a GitHub repository or unsupported URL format")
    return
end

local pr_url = string.format("https://github.com/%s/%s/pull/new/%s", owner, repo, bookmark)
exec_shell("open " .. pr_url)
'''

[[bindings]]
action = "open-github-pr"
seq = ["w", "r"]
scope = "revisions"
desc = "Open GitHub PR for bookmark"
